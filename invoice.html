<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Hóa đơn điện tử - Thanh Tâm Cosmetics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="images/logo/logo_backup.png">
    <style>
        :root {
            --primary: #e11d48;
            --secondary: #f472b6;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f3f4f6;
            padding: 50px 0;
        }

        .invoice-box {
            max-width: 800px;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .invoice-info {
            text-align: right;
        }

        .details {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        table th {
            background: #f9fafb;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #eee;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .total-section {
            text-align: right;
            margin-top: 30px;
            font-size: 18px;
        }

        .total-price {
            color: var(--primary);
            font-weight: 800;
            font-size: 24px;
        }

        .actions {
            margin-top: 40px;
            text-align: center;
        }

        .btn-print {
            background: var(--primary);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
        }

        @media print {
            .actions {
                display: none;
            }

            body {
                background: none;
                padding: 0;
            }

            .invoice-box {
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <div class="invoice-box" id="printArea">
        <div class="header">
            <div class="container">
                <a href="index.html" class="logo">
                    <img src="images/logo/logo_backup.png" alt="Thanh Tâm Logo" style="height: 45px; width: auto;"
                        class="logo-icon">
                    <div class="logo-text">Thanh <span>Tâm</span></div>
                </a>
            </div>
            <div class="invoice-info">
                <h2 style="margin:0">HÓA ĐƠN BÁN HÀNG</h2>
                <p>Mã đơn: <strong id="inv-id"></strong></p>
                <p>Ngày: <span id="inv-date"></span></p>
            </div>
        </div>

        <div class="details">
            <div>
                <h4>Khách hàng:</h4>
                <p id="inv-name"></p>
                <p id="inv-phone"></p>
                <p id="inv-address"></p>
            </div>
            <div style="text-align: right;">
                <h4>Đơn vị bán hàng:</h4>
                <p>Thanh Tâm Cosmetics</p>
                <p>Hotline: 0702932614</p>
                <p>Website: thanhtam.com</p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>SL</th>
                    <th>Đơn giá</th>
                    <th style="text-align: right;">Thành tiền</th>
                </tr>
            </thead>
            <tbody id="inv-items"></tbody>
        </table>

        <div class="total-section">
            <p>Tạm tính: <span id="inv-subtotal"></span></p>
            <p>Phí ship: <span id="inv-shipping"></span></p>
            <p>Tổng cộng: <span class="total-price" id="inv-total"></span></p>
        </div>
    </div>

    <div class="actions">
        <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> In hóa đơn</button>
        <button onclick="location.href='index.html'"
            style="background:none; border:none; color:#666; cursor:pointer;">Quay về trang chủ</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lastOrder = JSON.parse(localStorage.getItem('lastOrderData'));
            if (!lastOrder) return window.location.href = 'index.html';

            document.getElementById('inv-id').innerText = lastOrder.id;
            document.getElementById('inv-date').innerText = new Date(lastOrder.date).toLocaleDateString('vi-VN');
            document.getElementById('inv-name').innerText = lastOrder.customerName;
            document.getElementById('inv-phone').innerText = lastOrder.phone;
            document.getElementById('inv-address').innerText = lastOrder.address;

            const format = (p) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(p);

            document.getElementById('inv-items').innerHTML = lastOrder.items.map(item => `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.quantity}</td>
                    <td>${format(item.price)}</td>
                    <td style="text-align: right;">${format(item.price * item.quantity)}</td>
                </tr>
            `).join('');

            document.getElementById('inv-subtotal').innerText = format(lastOrder.subtotal);
            document.getElementById('inv-shipping').innerText = format(lastOrder.shipping);
            document.getElementById('inv-total').innerText = format(lastOrder.total);
        });
    </script>
</body>

</html>
